<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Killua Sticker Packs</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f2f2f2;
      margin: 0;
      padding: 20px;
    }

    h1, img, div {
      text-align: center;
      margin-bottom: 30px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }

    .card {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .card:hover {
      transform: scale(1.02);
    }

    .card img.cover {
      width: 100%;
      height: 180px;
      object-fit: cover;
    }

    .card-body {
      padding: 15px;
    }

    .card-body h2 {
      font-size: 1.1em;
      margin: 0 0 5px;
    }

    .card-body p {
      font-size: 0.95em;
      margin: 0 0 8px;
      color: #555;
    }

    .btn {
      margin-top: 10px;
      padding: 8px 12px;
      border: none;
      background: #009688;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }

    .btn:hover {
      background: #00796b;
    }

    /* Modal */
    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100vw;
      height: 100vh;
      background-color: rgba(0,0,0,0.5);
      justify-content: center;
      align-items: center;
    }

    .modal-content {
      background: white;
      padding: 20px;
      max-width: 600px;
      max-height: 80vh;
      overflow-y: auto;
      border-radius: 8px;
      text-align: center;
    }

    .modal-content h3 {
      margin-bottom: 15px;
    }

    .modal-content .stickers {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
    }

    .modal-content img {
      width: 80px;
      height: 80px;
      border-radius: 6px;
      object-fit: cover;
    }

    .close-btn {
      margin-top: 15px;
      padding: 6px 12px;
      background: #e53935;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    .close-btn:hover {
      background: #c62828;
    }
  </style>
</head>
<body>

  <div><img src="../icon/icon.jpg" width="50px"><h1>killua-sticker-api</h1></div>
  <div class="grid" id="packsContainer"></div>

  <!-- Modal -->
  <div class="modal" id="modal">
    <div class="modal-content">
    <h3 id="modalTitle"></h3>
    <p id="modalDescription" style="margin-top: -10px; font-size: 0.95rem;"></p>
    <div id="modalStickers" class="stickers"></div>
  </div>

  <script>
    fetch('../killua-sticker-api.json')
  .then(res => res.json())
  .then(packs => {
    const container = document.getElementById('packsContainer');

    packs.forEach((pack, index) => {
      const card = document.createElement('div');
      card.className = 'card';

      const coverPath = '../' + pack.cover;

      card.innerHTML = `
        <img src="${coverPath}" alt="${pack.name}" class="cover" />
        <div class="card-body">
          <h2>${pack.name}</h2>
          <p><strong>Código:</strong> ${pack.code}</p>
          <p><strong>Autor:</strong> ${pack.author}</p>
          <button class="btn" onclick='showStickers(${JSON.stringify(pack.stickers)}, "${pack.name}", "${pack.description || 'Sem descrição'}")'>Ver figurinhas</button>
        </div>
      `;

      container.appendChild(card);
    });
  });

function showStickers(stickers, title, description) {
  const modal = document.getElementById('modal');
  const modalStickers = document.getElementById('modalStickers');
  const modalTitle = document.getElementById('modalTitle');
  const modalDesc = document.getElementById('modalDescription');

  modalTitle.textContent = title;
  modalDesc.textContent = description;
  modalStickers.innerHTML = '';

  stickers.forEach(path => {
    const img = document.createElement('img');
    img.src = '../' + path;
    modalStickers.appendChild(img);
  });

  modal.style.display = 'flex';
}

function closeModal() {
  document.getElementById('modal').style.display = 'none';
}

// Fecha modal ao clicar fora do conteúdo
window.onclick = function(event) {
  const modal = document.getElementById('modal');
  if (event.target === modal) {
    closeModal();
  }
};

  </script>

</body>
</html>
